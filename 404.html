<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/png" href="/favicon.png"/>
<title>Página no encontrada (404) — M2 Energy</title>
<meta name="robots" content="noindex, follow"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --amber:#f6be1f;--bg-0:#0e1c28;--bg-1:#13283a;
    --ink:#fafcff;--ink-dim:#cdd8e3;--ink-mute:#8ea0b0;
    --line:rgba(255,255,255,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, var(--bg-1), var(--bg-0));
    color:var(--ink);font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:grid;place-items:center;text-align:center;padding:32px;
  }
  .wrap{max-width:560px}
  .brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:40px;text-decoration:none;color:var(--ink);font-weight:700}
  .brand-mark{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--amber) 0%,#e0a417 100%);display:grid;place-items:center;box-shadow:0 8px 24px -8px rgba(246,190,31,.6)}
  .brand-mark svg{width:18px;height:18px}
  .brand-text{font-family:'Space Grotesk',sans-serif;font-size:18px}
  .brand-text span{color:var(--amber)}
  .code{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.28em;color:var(--amber);text-transform:uppercase}
  h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:700;line-height:1.1;letter-spacing:-.02em;margin:18px 0 14px}
  p{color:var(--ink-dim);font-size:16px;line-height:1.65;margin-bottom:32px}
  .actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{font-size:14px;font-weight:600;padding:12px 22px;border-radius:999px;text-decoration:none;transition:transform .2s,box-shadow .2s,border-color .2s}
  .btn-primary{background:var(--amber);color:#0a1620;box-shadow:0 8px 24px -6px rgba(246,190,31,.5)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 32px -6px rgba(246,190,31,.7)}
  .btn-ghost{color:var(--ink-dim);border:1px solid var(--line)}
  .btn-ghost:hover{color:var(--ink);border-color:rgba(255,255,255,.28)}
</style>
</head>
<body>
  <div class="wrap">
    <a class="brand" href="/">
      <span class="brand-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z" fill="#0a1620"/></svg></span>
      <span class="brand-text">M2 <span>Energy</span></span>
    </a>
    <div class="code">Error 404</div>
    <h1>Esta página se quedó sin energía.</h1>
    <p>La dirección que buscas no existe o se movió. Volvamos a terreno firme.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Ir al inicio</a>
      <a class="btn btn-ghost" href="/blog/">Ver el blog</a>
    </div>
  </div>
</body>
</html>
